<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ｜株式会社LIF（リフ）</title>
<link rel="icon" href="/favicon.png" type="image/png">
<meta name="description" content="株式会社LIF（リフ）へのお問い合わせフォームです。WEB制作・SNS運用・広告運用・IT開発に関するご相談はこちらからお気軽にどうぞ。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Zen+Kaku+Gothic+New:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
 :root{
 --paper:#F5F7FA;
 --paper-2:#FFFFFF;
 --ink:#0F172A;
 --ink-soft:#334155;
 --muted:#64748B;
 --accent:#2563EB;
 --hair:#E2E8F0;
 --maxw:1080px;
 }
 *{box-sizing:border-box;margin:0;padding:0;}
 html{scroll-behavior:smooth;}
 body{
 background:var(--paper);
 color:var(--ink);
 font-family:"Noto Sans JP",sans-serif;
 font-weight:400;
 line-height:1.8;
 -webkit-font-smoothing:antialiased;
 text-rendering:optimizeLegibility;
 }
 .wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px;}
 .eyebrow{
 font-family:"Space Grotesk",sans-serif;
 font-weight:500;
 font-size:12px;
 letter-spacing:.28em;
 text-transform:uppercase;
 color:var(--muted);
 }
 .accent{color:var(--accent);}

 /* ---------- nav ---------- */
 header{
 position:sticky;top:0;z-index:50;
 background:rgba(245,247,250,.92);
 backdrop-filter:saturate(140%) blur(10px);
 border-bottom:1px solid var(--hair);
 }
 .nav{display:flex;align-items:center;justify-content:space-between;height:66px;}
 .mark{
 font-family:"Space Grotesk",sans-serif;
 font-weight:700;
 font-size:24px;
 letter-spacing:.04em;
 color:var(--ink);
 text-decoration:none;
 display:flex;align-items:center;gap:8px;
 }
 .mark-logo{height:28px;width:auto;display:block;object-fit:contain;}
 .mark .yomi{font-family:"Zen Kaku Gothic New",sans-serif;font-size:11px;font-weight:500;color:var(--muted);letter-spacing:.08em;}
 .nav-links{display:flex;gap:20px;align-items:center;}
 .nav-links a{
 font-size:13px;font-weight:500;color:var(--ink-soft);
 text-decoration:none;letter-spacing:.04em;transition:color .2s;
 }
 .nav-links a:hover{color:var(--accent);}
 .nav-links .cta{
 border:1.5px solid var(--ink);border-radius:999px;
 padding:7px 16px;color:var(--ink);
 font-size:12px;
 }
 .nav-links .cta:hover{background:var(--ink);color:var(--paper);}

 .menu-toggle{
 display:none;
 background:none;
 border:none;
 cursor:pointer;
 width:32px;
 height:32px;
 position:relative;
 z-index:100;
 flex-direction:column;
 justify-content:center;
 gap:6px;
 padding:0;
 }
 .menu-toggle span{
 display:block;
 width:100%;
 height:2px;
 background:var(--ink);
 border-radius:2px;
 transition:transform .3s, opacity .3s;
 }
 .menu-toggle.active span:nth-child(1){ transform:translateY(8px) rotate(45deg); }
 .menu-toggle.active span:nth-child(2){ opacity:0; }
 .menu-toggle.active span:nth-child(3){ transform:translateY(-8px) rotate(-45deg); }

 @media(max-width:768px){ 
 .wrap{padding:0 16px;}
 .nav{height:58px;}
 .mark-logo{height:24px;}
 .mark .yomi{display:none;}
 .menu-toggle{display:flex;}

 .nav-links{
 position:fixed;
 top:0;
 right:-100%;
 width:100%;
 height:100vh;
 background:rgba(15, 23, 42, 0.96);
 backdrop-filter:blur(12px);
 flex-direction:column;
 justify-content:center;
 align-items:center;
 gap:28px;
 transition:right .3s ease;
 z-index:90;
 }
 .nav-links.active{
 right:0;
 }
 .nav-links a{
 color:#FFFFFF;
 font-size:18px;
 font-weight:700;
 }
 .nav-links .cta{
 border-color:#FFFFFF;
 color:#FFFFFF;
 font-size:16px;
 padding:12px 32px;
 margin-top:12px;
 }
 }

 /* ---------- contact form ---------- */
 .contact{padding:64px 0;background:var(--paper-2);}
 .contact .wrap{max-width:680px;}
 .contact-head{text-align:center;margin-bottom:36px;}
 .contact-head .eyebrow{margin-bottom:12px;}
 .contact-head h1{
 font-family:"Zen Kaku Gothic New",sans-serif;font-weight:900;
 font-size:clamp(26px,4vw,36px);margin-bottom:12px;letter-spacing:.02em;
 }
 .contact-head p{color:var(--ink-soft);font-size:14px;line-height:1.8;}
 
.contact-form{display:flex;flex-direction:column;gap:20px;}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-group label{
 font-size:14px;font-weight:700;color:var(--ink);
 display:flex;align-items:center;gap:8px;
}
.form-group label .req{
 font-size:11px;color:var(--paper);background:var(--accent);
 padding:2px 6px;border-radius:4px;font-weight:500;
}
.form-group label .opt{
 font-size:11px;color:var(--muted);background:var(--hair);
 padding:2px 6px;border-radius:4px;font-weight:500;
}
.form-group input,
.form-group textarea{
 font-family:inherit;font-size:15px;padding:12px 14px;
 background:var(--paper);border:1px solid var(--hair);
 border-radius:8px;color:var(--ink);outline:none;
 transition:border-color .2s;
 width:100%;
}
.form-group input:focus,
.form-group textarea:focus{border-color:var(--accent);}
.form-group textarea{resize:vertical;min-height:130px;}

.privacy-notice{
 font-size:12px;color:var(--ink-soft);text-align:center;margin-top:6px;
}
.privacy-notice a{color:var(--accent);text-decoration:underline;}

.form-submit{text-align:center;margin-top:10px;}
.submitbtn{
 display:inline-block;font-family:"Space Grotesk",sans-serif;font-weight:700;
 font-size:15px;letter-spacing:.04em;color:var(--paper-2);background:var(--ink);
 padding:15px 48px;border-radius:999px;border:none;cursor:pointer;
 transition:transform .2s,background .2s;
 width:100%;
 max-width:320px;
}
.submitbtn:hover{background:var(--accent);transform:translateY(-2px);}
.direct-mail{text-align:center;margin-top:20px;font-size:12px;color:var(--muted);}
.direct-mail a{color:var(--ink-soft);text-decoration:underline;}

#form-thanks{
 display:none;
 text-align:center;
 padding:32px 16px;
 background:var(--paper);
 border-radius:12px;
 border:1px solid var(--hair);
 margin-top:20px;
}
#form-thanks h3{
 font-family:"Zen Kaku Gothic New",sans-serif;
 font-size:20px;font-weight:700;color:var(--ink);margin-bottom:10px;
}
#form-thanks p{
 font-size:13px;color:var(--ink-soft);
}

 @media(max-width:680px){
 .contact{padding:42px 0;}
 }

 /* ---------- footer ---------- */
 footer{border-top:1px solid var(--hair);padding:28px 0;}
 .foot{display:flex;justify-content:space-between;align-items:center;
 font-size:12px;color:var(--muted);letter-spacing:.04em;flex-wrap:wrap;gap:14px;}
 .foot-links a{color:var(--muted);text-decoration:none;margin-left:14px;}
 .foot-links a:hover{color:var(--accent);text-decoration:underline;}
 @media(max-width:680px){
 .foot{flex-direction:column;align-items:flex-start;gap:16px;}
 .foot-links a{margin-left:0;margin-right:14px;display:inline-block;}
 }
</style>
</head>
<body>

<header>
 <div class="wrap nav">
 <a href="/" class="mark">
 <img src="/logo.png" alt="LIF Logo" class="mark-logo">
 <span><span class="yomi">株式会社リフ</span></span>
 </a>

 <button class="menu-toggle" id="menuToggle" aria-label="メニューを開く">
 <span></span>
 <span></span>
 <span></span>
 </button>

 <nav class="nav-links" id="navLinks">
 <a href="/#mission" class="nav-item">ミッション</a>
 <a href="/#service" class="nav-item">事業内容</a>
 <a href="/#strength" class="nav-item">強み</a>
 <a href="/blog" class="nav-item">ブログ</a>
 <a href="/company" class="nav-item">会社概要</a>
 <a href="/contact" class="cta nav-item">お問い合わせ</a>
 </nav>
 </div>
</header>

<section class="contact">
 <div class="wrap">
 <div class="contact-head">
 <span class="eyebrow">Contact</span>
 <h1>お問い合わせ</h1>
 <p>難しく考えなくて大丈夫です。まずは今の課題だけ、お聞かせください。<br>複雑な部分は、私たちが引き受けます。</p>
 </div>

 <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(submitted){showThanks();}"></iframe>

 <form id="gform" class="contact-form" action="https://docs.google.com/forms/d/e/1FAIpQLSeCKhhuEAR2RddyUwc-3MxMvJb54quSKJJhkVkZ0G26_gxOOA/formResponse" method="POST" target="hidden_iframe" onsubmit="submitted=true;">
 <div class="form-group">
 <label for="company-name">貴社名・屋号 <span class="opt">任意</span></label>
 <input type="text" id="company-name" name="entry.1692253893" placeholder="株式会社〇〇">
 </div>
 <div class="form-group">
 <label for="user-name">お名前 <span class="req">必須</span></label>
 <input type="text" id="user-name" name="entry.1328003430" required placeholder="山田 太郎">
 </div>
 <div class="form-group">
 <label for="user-email">メールアドレス <span class="req">必須</span></label>
 <input type="email" id="user-email" name="entry.2122228540" required placeholder="example@lif.jp">
 </div>
 <div class="form-group">
 <label for="message">お問い合わせ内容 <span class="req">必須</span></label>
 <textarea id="message" name="entry.1812763490" required placeholder="ご相談内容やご質問をご記入ください。"></textarea>
 </div>
 <p class="privacy-notice">送信することで、<a href="/privacy">個人情報保護方針（プライバシーポリシー）</a>に同意したものとみなされます。</p>
 <div class="form-submit">
 <button type="submit" class="submitbtn">送信する</button>
 </div>
 </form>

 <div id="form-thanks">
 <h3>お問い合わせを受け付けました</h3>
 <p>ご連絡いただきありがとうございます。内容を確認のうえ、担当者より順次ご連絡いたします。</p>
 </div>

 <p class="direct-mail">直接のご連絡はこちら: <a href="mailto:contact@lif.jp">contact@lif.jp</a></p>
 </div>
</section>

<footer>
 <div class="wrap foot">
 <div>
 <img src="/logo.png" alt="LIF Logo" class="mark-logo" style="height:20px; margin-bottom:8px;">
 <div>© 2026 株式会社LIF（リフ） / lif.jp</div>
 </div>
 <div class="foot-links">
 <a href="/blog">ブログ</a>
 <a href="/company">会社概要</a>
 <a href="/contact">お問い合わせ</a>
 <a href="/privacy">プライバシーポリシー</a>
 </div>
 </div>
</footer>

<script>
var submitted = false;
function showThanks() {
 document.getElementById('gform').style.display = 'none';
 document.getElementById('form-thanks').style.display = 'block';
}

const menuToggle = document.getElementById('menuToggle');
const navLinks = document.getElementById('navLinks');
const navItems = document.querySelectorAll('.nav-item');

menuToggle.addEventListener('click', () => {
 menuToggle.classList.toggle('active');
 navLinks.classList.toggle('active');
});

navItems.forEach(item => {
 item.addEventListener('click', () => {
 menuToggle.classList.remove('active');
 navLinks.classList.remove('active');
 });
});
</script>

</body>
</html>
