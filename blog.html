<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ブログ・お知らせ｜株式会社LIF（リフ）</title>
<link rel="icon" href="/favicon.png" type="image/png">
<meta name="description" content="株式会社LIF（リフ）のブログ・お知らせ一覧です。WEB制作・SNS運用・広告運用・IT開発に関する情報をお届けします。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Zen+Kaku+Gothic+New:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
 :root{
 --paper:#F5F7FA;
 --paper-2:#FFFFFF;
 --ink:#0F172A;
 --ink-soft:#334155;
 --muted:#64748B;
 --accent:#2563EB;
 --hair:#E2E8F0;
 --maxw:1080px;
 }
 *{box-sizing:border-box;margin:0;padding:0;}
 html{scroll-behavior:smooth;}
 body{
 background:var(--paper);
 color:var(--ink);
 font-family:"Noto Sans JP",sans-serif;
 font-weight:400;
 line-height:1.8;
 -webkit-font-smoothing:antialiased;
 text-rendering:optimizeLegibility;
 }
 .wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px;}
 .eyebrow{
 font-family:"Space Grotesk",sans-serif;
 font-weight:500;
 font-size:12px;
 letter-spacing:.28em;
 text-transform:uppercase;
 color:var(--muted);
 }

 /* nav */
 header{
 position:sticky;top:0;z-index:50;
 background:rgba(245,247,250,.92);
 backdrop-filter:saturate(140%) blur(10px);
 border-bottom:1px solid var(--hair);
 }
 .nav{display:flex;align-items:center;justify-content:space-between;height:66px;}
 .mark{
 font-family:"Space Grotesk",sans-serif;
 font-weight:700;
 font-size:24px;
 letter-spacing:.04em;
 color:var(--ink);
 text-decoration:none;
 display:flex;align-items:center;gap:8px;
 }
 .mark-logo{height:28px;width:auto;display:block;object-fit:contain;}
 .mark .yomi{font-family:"Zen Kaku Gothic New",sans-serif;font-size:11px;font-weight:500;color:var(--muted);letter-spacing:.08em;}
 .nav-links{display:flex;gap:20px;align-items:center;}
 .nav-links a{
 font-size:13px;font-weight:500;color:var(--ink-soft);
 text-decoration:none;letter-spacing:.04em;transition:color .2s;
 }
 .nav-links a:hover{color:var(--accent);}
 .nav-links .cta{
 border:1.5px solid var(--ink);border-radius:999px;
 padding:7px 16px;color:var(--ink);
 font-size:12px;
 }
 .menu-toggle{display:none;background:none;border:none;cursor:pointer;width:32px;height:32px;position:relative;z-index:100;flex-direction:column;justify-content:center;gap:6px;padding:0;}
 .menu-toggle span{display:block;width:100%;height:2px;background:var(--ink);border-radius:2px;transition:transform .3s, opacity .3s;}
 .menu-toggle.active span:nth-child(1){ transform:translateY(8px) rotate(45deg); }
 .menu-toggle.active span:nth-child(2){ opacity:0; }
 .menu-toggle.active span:nth-child(3){ transform:translateY(-8px) rotate(-45deg); }

 @media(max-width:768px){ 
 .wrap{padding:0 16px;}
 .nav{height:58px;}
 .mark-logo{height:24px;}
 .mark .yomi{display:none;}
 .menu-toggle{display:flex;}
 .nav-links{position:fixed;top:0;right:-100%;width:100%;height:100vh;background:rgba(15, 23, 42, 0.96);backdrop-filter:blur(12px);flex-direction:column;justify-content:center;align-items:center;gap:28px;transition:right .3s ease;z-index:90;}
 .nav-links.active{right:0;}
 .nav-links a{color:#FFFFFF;font-size:18px;font-weight:700;}
 .nav-links .cta{border-color:#FFFFFF;color:#FFFFFF;font-size:16px;padding:12px 32px;margin-top:12px;}
 }

 /* page head */
 .page-head{padding:60px 0 32px;border-bottom:1px solid var(--hair);background:var(--paper-2);}
 .page-head .eyebrow{margin-bottom:8px;}
 .page-head h1{font-family:"Zen Kaku Gothic New",sans-serif;font-weight:900;font-size:clamp(26px,4.5vw,42px);letter-spacing:.01em;}

 /* blog list */
 .block{padding:54px 0;min-height:50vh;}
 .blog-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));gap:32px;}
 .blog-card{background:var(--paper-2);border-radius:12px;overflow:hidden;border:1px solid var(--hair);text-decoration:none;color:inherit;transition:transform .2s, box-shadow .2s;display:flex;flex-direction:column;}
 .blog-card:hover{transform:translateY(-4px);box-shadow:0 12px 24px rgba(0,0,0,0.06);}
 .blog-card img{width:100%;height:180px;object-fit:cover;background:var(--hair);}
 .blog-card-body{padding:20px;display:flex;flex-direction:column;flex-grow:1;}
 .blog-date{font-size:12px;color:var(--muted);margin-bottom:8px;}
 .blog-card h2{font-size:17px;font-weight:700;line-height:1.5;margin-bottom:12px;color:var(--ink);}

 footer{border-top:1px solid var(--hair);padding:28px 0;}
 .foot{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted);letter-spacing:.04em;flex-wrap:wrap;gap:14px;}
 .foot-links a{color:var(--muted);text-decoration:none;margin-left:14px;}
 .foot-links a:hover{color:var(--accent);text-decoration:underline;}
 @media(max-width:680px){
 .foot{flex-direction:column;align-items:flex-start;gap:16px;}
 .foot-links a{margin-left:0;margin-right:14px;display:inline-block;}
 }
</style>
</head>
<body>

<header>
 <div class="wrap nav">
 <a href="/" class="mark">
 <img src="/logo.png" alt="LIF Logo" class="mark-logo">
 <span><span class="yomi">株式会社リフ</span></span>
 </a>
 <button class="menu-toggle" id="menuToggle" aria-label="メニューを開く">
 <span></span><span></span><span></span>
 </button>
 <nav class="nav-links" id="navLinks">
 <a href="/#mission" class="nav-item">ミッション</a>
 <a href="/#service" class="nav-item">事業内容</a>
 <a href="/#strength" class="nav-item">強み</a>
 <a href="/blog" class="nav-item">ブログ</a>
 <a href="/company" class="nav-item">会社概要</a>
 <a href="/contact" class="cta nav-item">お問い合わせ</a>
 </nav>
 </div>
</header>

<section class="page-head">
 <div class="wrap">
 <span class="eyebrow">Blog & News</span>
 <h1>ブログ・お知らせ</h1>
 </div>
</section>

<section class="block">
 <div class="wrap">
 <div class="blog-grid" id="blog-list">
 <p>記事を読み込んでいます...</p>
 </div>
 </div>
</section>

<footer>
 <div class="wrap foot">
 <div>
 <img src="/logo.png" alt="LIF Logo" class="mark-logo" style="height:20px; margin-bottom:8px;">
 <div>© 2026 株式会社LIF（リフ） / lif.jp</div>
 </div>
 <div class="foot-links">
 <a href="/blog">ブログ</a>
 <a href="/company">会社概要</a>
 <a href="/contact">お問い合わせ</a>
 <a href="/privacy">プライバシーポリシー</a>
 </div>
 </div>
</footer>

<script>
// メニュー制御
const menuToggle = document.getElementById('menuToggle');
const navLinks = document.getElementById('navLinks');
menuToggle.addEventListener('click', () => {
 menuToggle.classList.toggle('active');
 navLinks.classList.toggle('active');
});
navLinks.querySelectorAll('a').forEach(item => {
 item.addEventListener('click', () => {
 menuToggle.classList.remove('active');
 navLinks.classList.remove('active');
 });
});

// microCMSから記事一覧を取得
const SERVICE_DOMAIN = "lif-blog";
const API_KEY = "aNSRRWHVUP1dB7GOytLS0gqqwyEItBHXDJho";

fetch(`https://${SERVICE_DOMAIN}.microcms.io/api/v1/blogs`, {
 headers: { "X-MICROCMS-API-KEY": API_KEY }
})
.then(res => res.json())
.then(data => {
 const listContainer = document.getElementById('blog-list');
 if (!data.contents || data.contents.length === 0) {
 listContainer.innerHTML = '<p>現在記事はありません。microCMSから最初の記事を投稿してみましょう！</p>';
 return;
 }
 listContainer.innerHTML = data.contents.map(article => {
 const date = new Date(article.publishedAt || article.createdAt).toLocaleDateString('ja-JP');
 const imgUrl = article.eyecatch ? article.eyecatch.url : '/hero-img.jpg';
 return `
 <a href="/post?id=${article.id}" class="blog-card">
 <img src="${imgUrl}" alt="${article.title}">
 <div class="blog-card-body">
 <span class="blog-date">${date}</span>
 <h2>${article.title}</h2>
 </div>
 </a>
 `;
 }).join('');
})
.catch(err => {
 console.error(err);
 document.getElementById('blog-list').innerHTML = '<p>記事の読み込みに失敗しました。</p>';
});
</script>

</body>
</html>
